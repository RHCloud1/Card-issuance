<table>
    <thead>
        <tr>
            <th>订单号</th>
            <th>商品</th>
            <th>金额</th>
            <th>联系方式</th>
            <th>支付</th>
            <th>状态</th>
            <th>时间</th>
        </tr>
    </thead>
    <tbody>
        {% for order in recent_orders %}
            <tr>
                <td><a href="{{ url_for('checkout', order_no=order.order_no) }}">{{ order.order_no }}</a></td>
                <td>{{ order.product_name }} × {{ order.quantity }}</td>
                <td>￥{{ order.amount_cents|yuan }}</td>
                <td>{{ order.contact }}</td>
                <td>{{ order.payment_provider }}</td>
                <td>{{ order.status }}</td>
                <td>{{ order.created_at }}</td>
            </tr>
        {% else %}
            <tr><td colspan="7">暂无订单。</td></tr>
        {% endfor %}
    </tbody>
</table>
